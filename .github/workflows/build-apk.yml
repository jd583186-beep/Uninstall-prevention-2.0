name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Generate launcher icons
        run: |
          mkdir -p app/src/main/res/mipmap-hdpi
          python3 -c "
          import struct, zlib

          def png(w, h, pixels):
              def chunk(tag, data):
                  c = zlib.crc32(tag + data) & 0xffffffff
                  return struct.pack('>I', len(data)) + tag + data + struct.pack('>I', c)
              raw = b''.join(b'\x00' + bytes(pixels[y*w*3:(y+1)*w*3]) for y in range(h))
              return b'\x89PNG\r\n\x1a\n' + chunk(b'IHDR', struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0)) + chunk(b'IDAT', zlib.compress(raw)) + chunk(b'IEND', b'')

          w, h = 48, 48
          px = []
          for y in range(h):
              for x in range(w):
                  cx, cy = x - 24, y - 24
                  if cx*cx + cy*cy < 22*22:
                      px.extend([26, 35, 126])
                  else:
                      px.extend([245, 245, 245])

          data = png(w, h, px)
          with open('app/src/main/res/mipmap-hdpi/ic_launcher.png', 'wb') as f:
              f.write(data)
          with open('app/src/main/res/mipmap-hdpi/ic_launcher_round.png', 'wb') as f:
              f.write(data)
          print('Icons generated')
          "

      - name: Download gradle-wrapper.jar
        run: |
          mkdir -p gradle/wrapper
          curl -L "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: UninstallPrevention-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: build-${{ github.run_number }}
          name: "Uninstall Prevention v1.0 (Build ${{ github.run_number }})"
          body: |
            ✅ APK automatically built from latest code.
            
            **How to install:**
            1. Download `app-debug.apk` below
            2. Open it on your Android phone
            3. Allow "Install from unknown sources" if prompted
          files: app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
